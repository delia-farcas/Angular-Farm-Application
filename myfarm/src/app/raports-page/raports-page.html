<div class="app-container">
  <div class="navbar">
    <button class="hamburger" onclick="document.body.classList.toggle('nav-open')">
      <span></span><span></span><span></span>
    </button>

    <div class="overlay" onclick="document.body.classList.remove('nav-open')"></div>

    <nav class="side-nav">
      <div class="logo">
        <img src="logo2.svg" alt="Logo" />
      </div>

      <a class="nav-item" (click)="navigateHome()">Acasa</a>
      <a class="nav-item" (click)="navigateToBazinga()">Predictor genetic</a>
      <a class="nav-item" (click)="goToLunarReports()">Rapoarte</a>

      <div class="sub-menu">
        <div class="sub-item" (click)="goToLunarReports()">Raport Lunar</div>
        <div class="sub-item" (click)="goToYearlyReports()">Raport anual</div>
      </div>

      <div class="separator"></div>

      <div class="user-account">
        <div class="user-pfp">C</div>
        <span class="user-name">Contul meu</span>
      </div>
    </nav>
  </div>
  <div class="main-content">
    @if (currentPage === 'lunar') {
      <app-lunar-reports> </app-lunar-reports>
    } @else if (currentPage === 'yearly') {
      <app-yearly-reports></app-yearly-reports>
    }
  </div>
</div>
