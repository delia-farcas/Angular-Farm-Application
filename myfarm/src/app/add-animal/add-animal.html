<div class="add-animal-page">
  <h1 class="page-title">
    {{ isEditMode ? 'Editează membrul fermei' : 'Adaugă un membru nou în fermă' }}
  </h1>

  <div class="picture-section">
    <div class="profile-picture">
      <span class="placeholder-icon">{{ selectedEmoji }}</span>
    </div>
    
    <a class="change-picture-link" (click)="togglePicker($event)" style="cursor: pointer;">
      Schimbă pictograma
    </a>

    <div class="icon-picker" [style.display]="isPickerVisible ? 'flex' : 'none'">
      <div class="icon-option" (click)="selectIcon('🐄')">🐄</div>
      <div class="icon-option" (click)="selectIcon('🐴')">🐴</div>
      <div class="icon-option" (click)="selectIcon('🐔')">🐔</div>
      <div class="icon-option" (click)="selectIcon('🐑')">🐑</div>
      <div class="icon-option" (click)="selectIcon('🐐')">🐐</div>
    </div>
  </div>

  <div class="form-grid">
    <div class="left-column">
      <div class="id-name-row">
        <div class="field id-field">
          <label>id</label>
          <input
            type="text"
            [value]="isEditMode ? animal.id : '(auto)'"
            disabled
          />
        </div>
        <div class="field name-field">
          <label>Nume:</label>
          <input [(ngModel)]="animal.name" placeholder="Nume">
        </div>
      </div>

      <div class="field">
        <label>Rasă/specie</label>
        <select class="age-unit" [(ngModel)]="animal.type">
          <option value="">Selectează</option>
          <option value="vaca">Vacă</option>
          <option value="porc">Porc</option>
          <option value="cal">Cal</option>
          <option value="gaina">Găină</option>
          <option value="oaie">Oaie</option>
          <option value="capra">Capră</option>
        </select>
      </div>

      <div class="field">
        <label>Sex</label>
        <div class="gender-options">
          <label class="radio-option">
            <input type="radio" name="sex" value="femela" [(ngModel)]="animal.sex" />
            Feminin
          </label>
          <label class="radio-option">
            <input type="radio" name="sex" value="masculin" [(ngModel)]="animal.sex" />
            Masculin
          </label>
        </div>
      </div>

      <div class="field">
        <label>Vârstă</label>
        <div class="age-row">
          <div class="age-input">
            <input type="number" [(ngModel)]="animal.age" placeholder="ex: 5">
          </div>
          <select class="age-unit">
            <option>luni</option>
            <option>ani</option>
          </select>
        </div>
      </div>
    </div>

    <div class="right-column">
      <div class="field">
        <label>Localizare</label>
        <textarea [(ngModel)]="animal.location" placeholder="ex: Padocul 3" rows="6"></textarea>
      </div>

      <div class="field">
        <label>Observatii</label>
        <textarea placeholder="ex: Gestantă, luna 5" rows="6"></textarea>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn-cancel" type="button" (click)="onBackClick()">Anulează</button>
    <button class="btn-submit" type="button" (click)="onSubmit()" [disabled]="!canSubmit">
      {{ isEditMode ? 'Salvează modificările' : 'Adaugă animal' }}
    </button>
  </div>
</div>
