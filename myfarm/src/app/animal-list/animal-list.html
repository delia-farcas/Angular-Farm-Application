<button (click)="addAnimal()">Adauga animal</button>

<app-animal-card
  *ngFor="let animal of animals"
  [animal]="animal"
  [animalImages]="getImages(animal.type)"
  [editIcon]="'edit.svg'"
  [deleteIcon]="'delete.svg'"
  (edit)="editAnimal($event)"
  (delete)="deleteAnimal($event)"
>
</app-animal-card>
